# Pin zod to one version: the MCP SDK (via @silkweave/mcp) peers on zod 3, and
# zod 3.25+ ships the v4 API at `zod/v4` (which silkweave uses), so one version
# satisfies everything and keeps a single @silkweave/core instance.
#
# NOTE: @silkweave/logger declares @clack/prompts as an OPTIONAL peer but
# imports it unconditionally, so the gateway package carries it as a real
# dependency — otherwise every consumer install crashes at import.
packages:
  - packages/*
overrides:
  zod: 3.25.76
